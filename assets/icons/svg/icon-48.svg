<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" shape-rendering="crispEdges">
  <rect width="48" height="48" rx="8" fill="#4A6CF7"/>
  <g fill="#FFF" opacity="0.5">
    <rect x="6" y="6" width="8" height="2"/><rect x="6" y="6" width="2" height="8"/>
    <rect x="34" y="6" width="8" height="2"/><rect x="40" y="6" width="2" height="8"/>
    <rect x="6" y="40" width="8" height="2"/><rect x="6" y="34" width="2" height="8"/>
    <rect x="34" y="40" width="8" height="2"/><rect x="40" y="34" width="2" height="8"/>
  </g>
  <g fill="#FFF">
    <!-- Stem 2w, 3px blocks -->
    <rect x="10" y="8" width="3" height="3"/><rect x="13" y="8" width="3" height="3"/>
    <rect x="10" y="11" width="3" height="3"/><rect x="13" y="11" width="3" height="3"/>
    <rect x="10" y="14" width="3" height="3"/><rect x="13" y="14" width="3" height="3"/>
    <rect x="10" y="17" width="3" height="3"/><rect x="13" y="17" width="3" height="3"/>
    <rect x="10" y="20" width="3" height="3"/><rect x="13" y="20" width="3" height="3"/>
    <rect x="10" y="23" width="3" height="3"/><rect x="13" y="23" width="3" height="3"/>
    <rect x="10" y="26" width="3" height="3"/><rect x="13" y="26" width="3" height="3"/>
    <rect x="10" y="29" width="3" height="3"/><rect x="13" y="29" width="3" height="3"/>
    <rect x="10" y="32" width="3" height="3"/><rect x="13" y="32" width="3" height="3"/>
    <rect x="10" y="35" width="3" height="3"/><rect x="13" y="35" width="3" height="3"/>
    <!-- Bowl top -->
    <rect x="16" y="8" width="3" height="3"/><rect x="19" y="8" width="3" height="3"/>
    <rect x="22" y="8" width="3" height="3"/><rect x="25" y="8" width="3" height="3"/>
    <!-- Bowl stepped corner -->
    <rect x="28" y="8" width="3" height="3"/>
    <rect x="28" y="11" width="3" height="3"/><rect x="31" y="11" width="3" height="3"/>
    <!-- Bowl right -->
    <rect x="31" y="14" width="3" height="3"/>
    <!-- Bowl bottom stepped corner -->
    <rect x="31" y="17" width="3" height="3"/>
    <rect x="28" y="17" width="3" height="3"/><rect x="28" y="20" width="3" height="3"/>
    <!-- Bowl bottom -->
    <rect x="16" y="20" width="3" height="3"/><rect x="19" y="20" width="3" height="3"/>
    <rect x="22" y="20" width="3" height="3"/><rect x="25" y="20" width="3" height="3"/>
    <!-- Leg 2w -->
    <rect x="22" y="23" width="3" height="3"/><rect x="25" y="23" width="3" height="3"/>
    <rect x="25" y="26" width="3" height="3"/><rect x="28" y="26" width="3" height="3"/>
    <rect x="28" y="29" width="3" height="3"/><rect x="31" y="29" width="3" height="3"/>
    <rect x="31" y="32" width="3" height="3"/><rect x="34" y="32" width="3" height="3"/>
    <rect x="31" y="35" width="3" height="3"/><rect x="34" y="35" width="3" height="3"/>
  </g>
</svg>