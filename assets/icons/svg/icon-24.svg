<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" shape-rendering="crispEdges">
  <rect width="24" height="24" rx="4" fill="#4A6CF7"/>
  <g fill="#FFF" opacity="0.5">
    <rect x="3" y="3" width="4" height="1"/><rect x="3" y="3" width="1" height="4"/>
    <rect x="17" y="3" width="4" height="1"/><rect x="20" y="3" width="1" height="4"/>
    <rect x="3" y="20" width="4" height="1"/><rect x="3" y="17" width="1" height="4"/>
    <rect x="17" y="20" width="4" height="1"/><rect x="20" y="17" width="1" height="4"/>
  </g>
  <g fill="#FFF">
    <!-- Simplified R at 2px blocks -->
    <!-- Stem -->
    <rect x="5" y="4" width="2" height="2"/><rect x="7" y="4" width="2" height="2"/>
    <rect x="5" y="6" width="2" height="2"/>
    <rect x="5" y="8" width="2" height="2"/>
    <rect x="5" y="10" width="2" height="2"/>
    <rect x="5" y="12" width="2" height="2"/>
    <rect x="5" y="14" width="2" height="2"/>
    <rect x="5" y="16" width="2" height="2"/>
    <rect x="5" y="18" width="2" height="2"/>
    <!-- Bowl top -->
    <rect x="9" y="4" width="2" height="2"/><rect x="11" y="4" width="2" height="2"/>
    <rect x="13" y="4" width="2" height="2"/>
    <!-- Bowl right -->
    <rect x="15" y="6" width="2" height="2"/>
    <rect x="15" y="8" width="2" height="2"/>
    <!-- Bowl close -->
    <rect x="13" y="10" width="2" height="2"/>
    <rect x="7" y="10" width="2" height="2"/><rect x="9" y="10" width="2" height="2"/>
    <rect x="11" y="10" width="2" height="2"/>
    <!-- Leg -->
    <rect x="9" y="12" width="2" height="2"/><rect x="11" y="12" width="2" height="2"/>
    <rect x="11" y="14" width="2" height="2"/><rect x="13" y="14" width="2" height="2"/>
    <rect x="13" y="16" width="2" height="2"/><rect x="15" y="16" width="2" height="2"/>
    <rect x="15" y="18" width="2" height="2"/><rect x="17" y="18" width="2" height="2"/>
  </g>
</svg>