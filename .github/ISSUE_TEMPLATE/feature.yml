name: Feature request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation where Rendry falls short today. This matters more than the proposed solution.
      placeholder: "When I capture a page with lots of animations, the final PNG shows mid-animation blur."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would help?
      description: What you'd like Rendry to do. Rough sketches and alternatives welcome.
    validations:
      required: true

  - type: dropdown
    id: tier
    attributes:
      label: Which tier should this belong to?
      description: Your guess — final decision is ours, but your sense of it helps.
      options:
        - Free (core feature)
        - Pro (power feature)
        - Either — don't mind
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Any workarounds you've tried?
      placeholder: "Tried switching to PDF — same problem. Tried disabling noise removal — didn't help."

  - type: checkboxes
    id: confirm
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and this isn't a duplicate
          required: true
